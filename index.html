<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MemeByApex 🧠💀</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#111;--border:#222;--text:#fff;--text2:#888;--accent:#ff3b5c;--accent2:#8b5cf6}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* Top Nav */
.top-nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),#FFE66D,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.refresh-btn{background:none;border:none;font-size:22px;cursor:pointer;transition:transform .3s}
.refresh-btn:hover{transform:rotate(180deg)}

/* Stories */
.stories{display:flex;gap:14px;padding:14px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer}
.story .ring{width:66px;height:66px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.story .ring.active{background:linear-gradient(135deg,#58CC02,#46a302)}
.story .ring .inner{width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--card)}
.story .name{font-size:11px;color:var(--text2);max-width:70px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Category Tabs */
.cat-tabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99;background:var(--bg)}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;padding:7px 16px;border-radius:50px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s}
.cat-tab:hover{border-color:#444;color:#ccc}
.cat-tab.active{background:#fff;color:#000;border-color:#fff}

/* Feed */
.feed{max-width:600px;margin:0 auto;padding-bottom:80px}
.post{border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:8px}
.post-header{display:flex;align-items:center;gap:10px;padding:12px 16px}
.post-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.post-user{font-size:13px;font-weight:600}
.post-sub{font-size:11px;color:var(--text2)}
.post-media{width:100%;position:relative;background:#0a0a0a;cursor:pointer;overflow:hidden}
.post-media img{width:100%;display:block;max-height:600px;object-fit:contain}
.post-media video{width:100%;display:block;max-height:600px}
.heart-fly{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;pointer-events:none;opacity:0;transition:none}
.heart-fly.pop{animation:heartPop .8s ease forwards}
@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.2);opacity:1}30%{transform:translate(-50%,-50%) scale(1);opacity:1}80%{opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.post-actions{display:flex;align-items:center;gap:16px;padding:10px 16px}
.post-actions .act{font-size:22px;cursor:pointer;transition:transform .2s}
.post-actions .act:hover{transform:scale(1.2)}
.post-actions .act.liked{color:#ff2d55}
.post-actions .spacer{flex:1}
.post-likes{padding:0 16px;font-size:13px;font-weight:700}
.post-title{padding:4px 16px 8px;font-size:13px;line-height:1.4}
.post-title b{font-weight:700;margin-right:6px}

/* Loading */
.loading{text-align:center;padding:40px;color:#444}
.spinner{width:36px;height:36px;border:3px solid #222;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.lightbox.show{display:flex}
.lightbox img{max-width:95%;max-height:90vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;z-index:201}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.bnav{background:none;border:none;color:#555;font-size:10px;font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;transition:color .2s}
.bnav.active{color:#fff}
.bnav .icon{font-size:22px}

/* Explore */
.explore-section{display:none;max-width:600px;margin:0 auto;padding:4px}
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding-bottom:80px}
.explore-item{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative}
.explore-item img{width:100%;height:100%;object-fit:cover}

/* Reels */
.reels-section{display:none;width:100%}
.reels-container{height:calc(100vh - 53px - 50px);overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;max-width:600px;margin:0 auto}
.reels-container::-webkit-scrollbar{display:none}
.reel{height:calc(100vh - 53px - 50px);scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.reel img{max-width:100%;max-height:100%;object-fit:contain}
.reel-info{position:absolute;bottom:60px;left:16px;right:60px}
.reel-user{font-size:14px;font-weight:700;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.reel-title{font-size:13px;color:#ddd;text-shadow:0 1px 4px rgba(0,0,0,.8);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.reel-side{position:absolute;right:12px;bottom:80px;display:flex;flex-direction:column;gap:20px;align-items:center}
.reel-side .rbtn{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:12px;color:#fff;cursor:pointer;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.reel-side .rbtn .ico{font-size:26px}

/* Error */
.error-msg{text-align:center;padding:40px 20px;color:#666}
.error-msg button{margin-top:12px;background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-family:inherit;font-weight:600;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:300;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer{text-align:center;padding:20px;color:#333;font-size:11px}

@media(min-width:768px){.explore-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<div class="top-nav">
  <div class="logo">MemeByApex</div>
  <button class="refresh-btn" onclick="loadAll()" title="Refresh">🔄</button>
</div>

<div class="stories" id="stories"></div>
<div class="cat-tabs" id="catTabs"></div>

<div class="feed" id="feedSection">
  <div id="feedContainer"></div>
  <div class="footer">Made by Wadeem for Doublespeed ⚡ | Powered by Reddit</div>
</div>

<div class="explore-section" id="exploreSection">
  <div class="explore-grid" id="exploreGrid"></div>
</div>

<div class="reels-section" id="reelsSection">
  <div class="reels-container" id="reelsContainer"></div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="">
</div>

<div class="bottom-nav">
  <button class="bnav active" onclick="switchTab('home')"><span class="icon">🏠</span>Home</button>
  <button class="bnav" onclick="switchTab('explore')"><span class="icon">🔍</span>Explore</button>
  <button class="bnav" onclick="switchTab('reels')"><span class="icon">🎬</span>Reels</button>
  <button class="bnav" onclick="loadAll()"><span class="icon">🔄</span>Refresh</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUBS = [
  {key:'memes', name:'Memes', emoji:'😂', sub:'memes'},
  {key:'dank', name:'Dank', emoji:'💀', sub:'dankmemes'},
  {key:'desi', name:'Desi', emoji:'🇮🇳', sub:'IndianDankMemes'},
  {key:'bollywood', name:'Bollywood', emoji:'🎬', sub:'BollywoodMemes'},
  {key:'brainrot', name:'Brainrot', emoji:'🧠', sub:'brainrot'},
  {key:'wholesome', name:'Wholesome', emoji:'🥰', sub:'wholesomememes'},
  {key:'shitpost', name:'Shitpost', emoji:'💩', sub:'shitposting'}
];

let allPosts = [];
let activeCat = 'all';
let activeTab = 'home';
let liked = JSON.parse(localStorage.getItem('mba_liked')||'[]');

// Stories
function renderStories(){
  document.getElementById('stories').innerHTML = 
    `<div class="story" onclick="filterCat('all')"><div class="ring ${activeCat==='all'?'active':''}"><div class="inner">🔥</div></div><div class="name">All</div></div>` +
    SUBS.map(s=>`<div class="story" onclick="filterCat('${s.key}')"><div class="ring ${activeCat===s.key?'active':''}"><div class="inner">${s.emoji}</div></div><div class="name">${s.name}</div></div>`).join('');
}

// Tabs
function renderTabs(){
  document.getElementById('catTabs').innerHTML = 
    `<button class="cat-tab ${activeCat==='all'?'active':''}" onclick="filterCat('all')">All</button>` +
    SUBS.map(s=>`<button class="cat-tab ${activeCat===s.key?'active':''}" onclick="filterCat('${s.key}')">${s.name}</button>`).join('');
}

function filterCat(cat){
  activeCat = cat;
  renderStories();
  renderTabs();
  renderFeed();
}

// Fetch from meme-api.com (CORS-friendly)
async function fetchSub(sub, count=20){
  try{
    const r = await fetch(`https://meme-api.com/gimme/${sub}/${count}`);
    const d = await r.json();
    return (d.memes||[]).filter(m=>!m.nsfw&&!m.spoiler).map(m=>({
      id: m.postLink,
      title: m.title,
      url: m.url,
      sub: m.subreddit,
      author: m.author,
      ups: m.ups,
      cat: SUBS.find(s=>s.sub.toLowerCase()===m.subreddit.toLowerCase())?.key || 'memes',
      preview: m.preview?.[2] || m.url
    }));
  }catch(e){
    console.error('Fetch error for',sub,e);
    return [];
  }
}

async function loadAll(){
  const feed = document.getElementById('feedContainer');
  feed.innerHTML = '<div class="loading"><div class="spinner"></div>Loading fresh memes...</div>';
  
  const promises = SUBS.map(s=>fetchSub(s.sub, 15));
  const results = await Promise.all(promises);
  allPosts = results.flat().sort(()=>Math.random()-.5);
  
  if(!allPosts.length){
    feed.innerHTML = '<div class="error-msg">Failed to load memes 😢<br><button onclick="loadAll()">Try Again</button></div>';
    return;
  }
  
  renderFeed();
  showToast(`Loaded ${allPosts.length} fresh memes 🔥`);
}

function renderFeed(){
  const posts = activeCat==='all' ? allPosts : allPosts.filter(p=>p.cat===activeCat);
  const feed = document.getElementById('feedContainer');
  
  if(!posts.length){
    feed.innerHTML = '<div class="error-msg">No memes found for this category<br><button onclick="filterCat(\'all\')">Show All</button></div>';
    return;
  }
  
  feed.innerHTML = posts.map((p,i)=>{
    const isLiked = liked.includes(p.id);
    const color = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'][i%7];
    return `<div class="post">
      <div class="post-header">
        <div class="post-avatar" style="background:${color}">${p.author?p.author[0].toUpperCase():'?'}</div>
        <div><div class="post-user">${p.author||'unknown'}</div><div class="post-sub">r/${p.sub}</div></div>
      </div>
      <div class="post-media" ondblclick="dblLike(this,'${encodeURI(p.id)}')">
        <img src="${p.url}" alt="${p.title}" loading="lazy" onerror="this.parentElement.style.display='none'" onclick="openLightbox('${p.url.replace(/'/g,"\\'")}')">
        <div class="heart-fly">❤️</div>
      </div>
      <div class="post-actions">
        <span class="act ${isLiked?'liked':''}" onclick="toggleLike(this,'${encodeURI(p.id)}')">❤️</span>
        <span class="act" onclick="openLightbox('${p.url.replace(/'/g,"\\'")}')">💬</span>
        <span class="act" onclick="sharePost('${p.url}')">📤</span>
        <span class="spacer"></span>
        <span class="act" onclick="savePost('${p.url}')">🔖</span>
      </div>
      <div class="post-likes">${formatNum(p.ups+(isLiked?1:0))} likes</div>
      <div class="post-title"><b>r/${p.sub}</b>${escHtml(p.title)}</div>
    </div>`;
  }).join('');
}

// Explore
function renderExplore(){
  const posts = activeCat==='all' ? [...allPosts].sort(()=>Math.random()-.5) : allPosts.filter(p=>p.cat===activeCat);
  document.getElementById('exploreGrid').innerHTML = posts.map(p=>
    `<div class="explore-item" onclick="openLightbox('${p.url.replace(/'/g,"\\'")}')"><img src="${p.preview||p.url}" alt="${p.title}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
  ).join('');
}

// Reels
function renderReels(){
  const posts = [...allPosts].sort(()=>Math.random()-.5).slice(0,30);
  document.getElementById('reelsContainer').innerHTML = posts.map(p=>
    `<div class="reel">
      <img src="${p.url}" alt="${p.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'">
      <div class="reel-info"><div class="reel-user">r/${p.sub} · ${p.author}</div><div class="reel-title">${escHtml(p.title)}</div></div>
      <div class="reel-side">
        <div class="rbtn" onclick="showToast('Liked! ❤️')"><span class="ico">❤️</span><span>${formatNum(p.ups)}</span></div>
        <div class="rbtn" onclick="sharePost('${p.url}')"><span class="ico">📤</span><span>Share</span></div>
        <div class="rbtn" onclick="savePost('${p.url}')"><span class="ico">🔖</span><span>Save</span></div>
      </div>
    </div>`
  ).join('');
}

// Navigation
function switchTab(tab){
  activeTab = tab;
  document.querySelectorAll('.bnav').forEach((b,i)=>b.classList.toggle('active',['home','explore','reels','refresh'][i]===tab));
  document.getElementById('feedSection').style.display = tab==='home'?'':'none';
  document.getElementById('exploreSection').style.display = tab==='explore'?'':'none';
  document.getElementById('reelsSection').style.display = tab==='reels'?'':'none';
  document.querySelector('.stories').style.display = tab==='home'?'':'none';
  document.querySelector('.cat-tabs').style.display = (tab==='home'||tab==='explore')?'':'none';
  if(tab==='explore') renderExplore();
  if(tab==='reels') renderReels();
}

// Interactions
function toggleLike(el, id){
  id = decodeURI(id);
  if(liked.includes(id)){liked=liked.filter(x=>x!==id);el.classList.remove('liked')}
  else{liked.push(id);el.classList.add('liked')}
  localStorage.setItem('mba_liked',JSON.stringify(liked));
}

function dblLike(el, id){
  id = decodeURI(id);
  if(!liked.includes(id)){liked.push(id);localStorage.setItem('mba_liked',JSON.stringify(liked))}
  const h = el.querySelector('.heart-fly');
  h.classList.remove('pop');void h.offsetWidth;h.classList.add('pop');
}

function sharePost(url){
  if(navigator.share){navigator.share({url})}
  else{navigator.clipboard.writeText(url).then(()=>showToast('Link copied! 🔗')).catch(()=>{})}
}

function savePost(url){
  navigator.clipboard.writeText(url).then(()=>showToast('Saved to clipboard! 🔖')).catch(()=>{});
}

function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});

// Utils
function formatNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n||0}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Init
renderStories();
renderTabs();
loadAll();
</script>
</body>
</html>
