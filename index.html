<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#111;--border:#222;--text:#fff;--text2:#aaa;--accent:#ff3b5c;--accent2:#8b5cf6;--like-red:#ff2d55}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}

/* Top Nav */
.top-nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.top-nav .logo{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top-nav .nav-icons{display:flex;gap:16px;font-size:22px;cursor:pointer}
.top-nav .nav-icons span:hover{opacity:.7}

/* Stories Bar */
.stories-bar{display:flex;gap:14px;padding:14px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.stories-bar::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer}
.story .ring{width:66px;height:66px;border-radius:50%;padding:3px;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.story .ring img{width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);object-fit:cover}
.story .name{font-size:11px;color:var(--text2);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

/* Category Tabs */
.cat-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99;background:var(--bg)}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;background:var(--card);border:1px solid var(--border);white-space:nowrap;cursor:pointer;transition:.2s}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-tab:hover{opacity:.85}

/* Feed */
.feed{max-width:600px;margin:0 auto;padding-bottom:80px}
.post{border-bottom:8px solid var(--border);background:var(--card)}
.post-header{display:flex;align-items:center;padding:12px 14px;gap:10px}
.post-header .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover}
.post-header .info{flex:1}
.post-header .info .username{font-size:14px;font-weight:700}
.post-header .info .category-badge{font-size:11px;color:var(--accent);font-weight:500}
.post-header .more{font-size:20px;cursor:pointer;color:var(--text2)}

/* Media */
.post-media{position:relative;width:100%;background:#000;cursor:pointer}
.post-media iframe{width:100%;aspect-ratio:9/16;max-height:580px;border:none;display:block}
.post-media img{width:100%;display:block}
.post-media.landscape iframe{aspect-ratio:16/9;max-height:400px}
.post-media.square iframe,.post-media.square img{aspect-ratio:1/1}

/* Double-tap heart */
.heart-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:100px;pointer-events:none;z-index:10;opacity:0;transition:none}
.heart-overlay.pop{animation:heartPop .8s ease-out forwards}
@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}15%{transform:translate(-50%,-50%) scale(1.3);opacity:1}30%{transform:translate(-50%,-50%) scale(1);opacity:1}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}}

/* Actions */
.post-actions{display:flex;align-items:center;padding:10px 14px;gap:16px}
.post-actions .left{display:flex;gap:16px;flex:1}
.action-btn{font-size:24px;cursor:pointer;transition:.15s;background:none;border:none;color:var(--text);padding:0}
.action-btn:hover{opacity:.7}
.action-btn.liked{color:var(--like-red);transform:scale(1.1)}
.action-btn.saved{color:#f5c518}

.post-likes{padding:0 14px 4px;font-size:13px;font-weight:700}
.post-caption{padding:4px 14px 10px;font-size:13px;line-height:1.5}
.post-caption .cap-user{font-weight:700;margin-right:6px}
.post-caption .hashtag{color:#8b9cf7}

/* Reels Section */
.reels-section{display:none}
.reels-container{height:calc(100vh - 53px - 44px);overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.reels-container::-webkit-scrollbar{display:none}
.reel{height:100%;scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.reel iframe{width:100%;height:100%;border:none}
.reel-side{position:absolute;right:12px;bottom:120px;display:flex;flex-direction:column;gap:20px;align-items:center;z-index:5}
.reel-side .rbtn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.reel-side .rbtn span:first-child{font-size:28px}
.reel-side .rbtn span:last-child{font-size:11px;color:var(--text2)}
.reel-info{position:absolute;bottom:60px;left:14px;right:60px;z-index:5}
.reel-info .reel-user{font-weight:700;font-size:14px}
.reel-info .reel-desc{font-size:13px;color:var(--text2);margin-top:4px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));max-width:600px;margin:0 auto}
.bnav{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text2);cursor:pointer;background:none;border:none;padding:4px 12px}
.bnav.active{color:var(--text)}
.bnav .icon{font-size:24px}

/* Explore Grid */
.explore-section{display:none;padding:8px}
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.explore-grid .explore-item{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative}
.explore-grid .explore-item img{width:100%;height:100%;object-fit:cover}
.explore-grid .explore-item iframe{width:100%;height:100%;border:none;pointer-events:none}
.explore-grid .explore-item .play-icon{position:absolute;top:8px;right:8px;font-size:18px}

/* Favorites */
.fav-section{display:none;padding:16px}
.fav-section h2{font-size:20px;margin-bottom:16px}
.fav-empty{text-align:center;color:var(--text2);padding:60px 20px}
.fav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}

/* Footer */
.site-footer{text-align:center;padding:30px 16px 100px;color:var(--text2);font-size:12px}
.site-footer .brand{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Share Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.share-modal{background:#222;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px}
.share-modal h3{text-align:center;margin-bottom:16px;font-size:16px}
.share-options{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.share-opt{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text2)}
.share-opt .sicon{width:50px;height:50px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:22px}
.share-modal .close-modal{text-align:center;margin-top:16px;padding:12px;color:var(--text2);cursor:pointer;font-weight:600}

@media(min-width:768px){
  .feed,.bottom-nav,.explore-section,.fav-section,.reels-container{max-width:600px;margin-left:auto;margin-right:auto}
}
</style>
</head>

  {id:39,cat:'🐸 Classic Memes',type:'image',user:'classic.memes',avatar:'😂',title:'Woman Yelling at Cat',caption:'The collab we never knew we needed 🐱🗣️ #womanyelling #smudge',src:'https://i.imgflip.com/345v97.jpg',likes:115000},
  {id:40,cat:'💪 Sigma/Gigachad',type:'video',user:'sigma.edits',avatar:'⚡',title:'Mike Ehrmantraut Sigma',caption:'Kid named finger 🗿 #mikeehrmantraut #sigma #breakingbad',src:'https://www.youtube.com/embed/WzhW20hLp6M',aspect:'portrait',likes:65400},
];

// ===== STATE =====
let currentCat = 'All';
let favorites = JSON.parse(localStorage.getItem('mba_favs')||'[]');
let currentShareId = null;

// ===== STORIES =====
function renderStories(){
  const users = [...new Set(CONTENT.map(c=>c.user))].slice(0,12);
  document.getElementById('storiesBar').innerHTML = users.map(u=>{
    const c = CONTENT.find(x=>x.user===u);
    return `<div class="story" onclick="showToast('Stories coming soon!')"><div class="ring"><img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=${u}" alt="${u}"></div><div class="name">${u}</div></div>`;
  }).join('');
}

// ===== CATEGORY TABS =====
function renderTabs(){
  document.getElementById('catTabs').innerHTML = CATEGORIES.map(c=>
    `<div class="cat-tab${c===currentCat?' active':''}" onclick="filterCat('${c}')">${c}</div>`
  ).join('');
}
function filterCat(cat){
  currentCat=cat;
  renderTabs();
  renderFeed();
}

// ===== FEED =====
function renderFeed(){
  const items = currentCat==='All'?CONTENT:CONTENT.filter(c=>c.cat===currentCat);
  document.getElementById('feedSection').innerHTML = items.map(c=>postHTML(c)).join('') +
    `<div class="site-footer"><div class="brand">MemeByApex</div><p style="margin-top:8px">Made by Wadeem for Doublespeed</p><p style="margin-top:4px">© 2026 · All memes belong to their creators</p></div>`;
}

function postHTML(c){
  const isFav = favorites.includes(c.id);
  const media = c.type==='video'
    ? `<iframe src="${c.src}?rel=0&modestbranding=1" allowfullscreen loading="lazy"></iframe>`
    : `<img src="${c.src}" alt="${c.title}" loading="lazy">`;
  const aspectClass = c.aspect==='landscape'?'landscape':c.aspect==='square'?'square':'';
  return `<article class="post" data-id="${c.id}">
    <div class="post-header">
      <img class="avatar" src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=${c.user}" alt="">
      <div class="info"><div class="username">${c.user}</div><div class="category-badge">${c.cat}</div></div>
      <div class="more" onclick="openShareModal(${c.id})">⋯</div>
    </div>
    <div class="post-media ${aspectClass}" ondblclick="doubleTapLike(this,${c.id})">
      ${media}
      <div class="heart-overlay">❤️</div>
    </div>
    <div class="post-actions">
      <div class="left">
        <button class="action-btn ${isLiked(c.id)?'liked':''}" onclick="toggleLike(this,${c.id})">❤️</button>
        <button class="action-btn" onclick="showToast('Comments coming soon!')">💬</button>
        <button class="action-btn" onclick="openShareModal(${c.id})">🔗</button>
      </div>
      <button class="action-btn ${isFav?'saved':''}" onclick="toggleSave(this,${c.id})">🔖</button>
    </div>
    <div class="post-likes" id="likes-${c.id}">${formatNum(c.likes + (isLiked(c.id)?1:0))} likes</div>
    <div class="post-caption"><span class="cap-user">${c.user}</span>${c.caption}</div>
  </article>`;
}

// ===== REELS =====
function renderReels(){
  const vids = CONTENT.filter(c=>c.type==='video'&&c.aspect==='portrait');
  document.getElementById('reelsContainer').innerHTML = vids.map(c=>`
    <div class="reel">
      <iframe src="${c.src}?rel=0&autoplay=0&modestbranding=1" allowfullscreen></iframe>
      <div class="reel-side">
        <div class="rbtn" onclick="showToast('Liked!')"><span>❤️</span><span>${formatNum(c.likes)}</span></div>
        <div class="rbtn" onclick="showToast('Comments soon!')"><span>💬</span><span>Reply</span></div>
        <div class="rbtn" onclick="openShareModal(${c.id})"><span>🔗</span><span>Share</span></div>
        <div class="rbtn" onclick="toggleSaveReel(${c.id})"><span>🔖</span><span>Save</span></div>
      </div>
      <div class="reel-info"><div class="reel-user">${c.user}</div><div class="reel-desc">${c.caption}</div></div>
    </div>
  `).join('');
}

// ===== EXPLORE =====
function renderExplore(){
  const shuffled = [...CONTENT].sort(()=>Math.random()-.5);
  document.getElementById('exploreGrid').innerHTML = shuffled.map(c=>{
    if(c.type==='video') return `<div class="explore-item" onclick="switchTab('home');filterCat('${c.cat}')"><img src="https://img.youtube.com/vi/${getYTId(c.src)}/hqdefault.jpg" alt="${c.title}"><span class="play-icon">▶️</span></div>`;
    return `<div class="explore-item" onclick="switchTab('home');filterCat('${c.cat}')"><img src="${c.src}" alt="${c.title}"></div>`;
  }).join('');
}

// ===== FAVORITES =====
function renderFavorites(){
  const favItems = CONTENT.filter(c=>favorites.includes(c.id));
  if(!favItems.length){document.getElementById('favContent').innerHTML='<div class="fav-empty"><p style="font-size:40px">🔖</p><p style="margin-top:12px">Save posts to see them here</p></div>';return;}
  document.getElementById('favContent').innerHTML = '<div class="fav-grid">'+favItems.map(c=>{
    if(c.type==='video') return `<div class="explore-item"><img src="https://img.youtube.com/vi/${getYTId(c.src)}/hqdefault.jpg" alt="${c.title}"><span class="play-icon">▶️</span></div>`;
    return `<div class="explore-item"><img src="${c.src}" alt="${c.title}"></div>`;
  }).join('')+'</div>';
}

// ===== NAVIGATION =====
function switchTab(tab){
  document.querySelectorAll('.bnav').forEach((b,i)=>{b.classList.toggle('active',['home','explore','reels','saved'][i]===tab)});
  document.getElementById('feedSection').style.display=tab==='home'?'':'none';
  document.getElementById('siteFooter').style.display=tab==='home'?'':'none';
  document.getElementById('exploreSection').style.display=tab==='explore'?'':'none';
  document.getElementById('reelsSection').style.display=tab==='reels'?'':'none';
  document.getElementById('favSection').style.display=tab==='saved'?'':'none';
  document.querySelector('.stories-bar').style.display=tab==='home'?'':'none';
  document.querySelector('.cat-tabs').style.display=(tab==='home'||tab==='explore')?'':'none';
  if(tab==='reels')renderReels();
  if(tab==='explore')renderExplore();
  if(tab==='saved')renderFavorites();
}

// ===== INTERACTIONS =====
let likedPosts = JSON.parse(localStorage.getItem('mba_likes')||'[]');
function isLiked(id){return likedPosts.includes(id)}
function toggleLike(btn,id){
  if(likedPosts.includes(id)){likedPosts=likedPosts.filter(x=>x!==id);btn.classList.remove('liked')}
  else{likedPosts.push(id);btn.classList.add('liked')}
  localStorage.setItem('mba_likes',JSON.stringify(likedPosts));
  const c=CONTENT.find(x=>x.id===id);
  document.getElementById('likes-'+id).textContent=formatNum(c.likes+(isLiked(id)?1:0))+' likes';
}
function doubleTapLike(el,id){
  if(!likedPosts.includes(id)){likedPosts.push(id);localStorage.setItem('mba_likes',JSON.stringify(likedPosts));
    const btn=el.closest('.post').querySelector('.action-btn');btn.classList.add('liked');
    const c=CONTENT.find(x=>x.id===id);document.getElementById('likes-'+id).textContent=formatNum(c.likes+1)+' likes';
  }
  const h=el.querySelector('.heart-overlay');h.classList.remove('pop');void h.offsetWidth;h.classList.add('pop');
}
function toggleSave(btn,id){
  if(favorites.includes(id)){favorites=favorites.filter(x=>x!==id);btn.classList.remove('saved');showToast('Removed from saved')}
  else{favorites.push(id);btn.classList.add('saved');showToast('Saved! 🔖')}
  localStorage.setItem('mba_favs',JSON.stringify(favorites));
}
function toggleSaveReel(id){
  if(favorites.includes(id)){favorites=favorites.filter(x=>x!==id);showToast('Removed from saved')}
  else{favorites.push(id);showToast('Saved! 🔖')}
  localStorage.setItem('mba_favs',JSON.stringify(favorites));
}

// ===== SHARE =====
function openShareModal(id){currentShareId=id;document.getElementById('shareModal').classList.add('show')}
function closeShareModal(){document.getElementById('shareModal').classList.remove('show')}
function copyLink(){navigator.clipboard.writeText('https://alisuleman27.github.io/memebyapex/');closeShareModal();showToast('Link copied! 🔗')}
function shareTwitter(){window.open('https://twitter.com/intent/tweet?text=Check+this+brainrot&url=https://alisuleman27.github.io/memebyapex/');closeShareModal()}
function shareWhatsApp(){window.open('https://wa.me/?text=Check+this+brainrot+https://alisuleman27.github.io/memebyapex/');closeShareModal()}
function shareTelegram(){window.open('https://t.me/share/url?url=https://alisuleman27.github.io/memebyapex/&text=Brainrot+content');closeShareModal()}

// ===== UTILS =====
function formatNum(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n}
function getYTId(url){const m=url.match(/embed\/([^?]+)/);return m?m[1]:''}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function toggleDarkLight(){document.body.style.background=document.body.style.background==='#fff'?'#000':'#fff';document.body.style.color=document.body.style.color==='#000'?'#fff':'#000'}

// Click outside share modal to close
document.getElementById('shareModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeShareModal()});

// ===== INIT =====
renderStories();renderTabs();renderFeed();
</script>
</body>
</html>
