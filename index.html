<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MemeByApex</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#111;--border:#222;--text:#fafafa;--text2:#a8a8a8;--accent:#e1306c;--blue:#0095f6}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}

/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;height:50px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .refresh-btn{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}

/* Stories */
.stories{position:fixed;top:50px;left:0;right:0;z-index:90;background:var(--bg);border-bottom:1px solid var(--border);display:flex;gap:12px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.story .ring{width:62px;height:62px;border-radius:50%;padding:3px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.story .ring.active{background:var(--blue)}
.story .ring.viewed{background:#555}
.story .avatar{width:100%;height:100%;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--bg)}
.story span{font-size:11px;color:var(--text2);max-width:64px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Tabs */
.tabs{position:fixed;top:132px;left:0;right:0;z-index:80;background:var(--bg);display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:var(--text);border-bottom-color:var(--text)}

/* Main content */
.content{padding-top:180px;padding-bottom:60px;min-height:100vh}

/* Feed */
.feed{max-width:600px;margin:0 auto}
.post{background:var(--card);border-bottom:1px solid var(--border);margin-bottom:2px}
.post-header{display:flex;align-items:center;padding:10px 14px;gap:10px}
.post-header .sub-icon{width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:16px}
.post-header .sub-info{flex:1}
.post-header .sub-name{font-size:13px;font-weight:600}
.post-header .post-time{font-size:11px;color:var(--text2)}
.post-title{padding:0 14px 8px;font-size:14px;line-height:1.4}
.post-media{position:relative;width:100%;background:#0a0a0a;cursor:pointer;display:flex;align-items:center;justify-content:center;min-height:200px}
.post-media img{width:100%;display:block;max-height:80vh;object-fit:contain}
.post-media video{width:100%;display:block;max-height:80vh;object-fit:contain}
.post-actions{display:flex;align-items:center;padding:10px 14px;gap:16px}
.post-actions button{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;gap:4px}
.post-actions button.liked{color:#ed4956}
.post-actions .stats{margin-left:auto;font-size:12px;color:var(--text2)}
.heart-anim{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;opacity:0;pointer-events:none;z-index:5}
.heart-anim.show{animation:heartPop .8s ease forwards}
@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}50%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* Grid (Explore) */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;max-width:600px;margin:0 auto;padding:0 2px}
.grid-item{aspect-ratio:1;overflow:hidden;cursor:pointer;position:relative;background:#111}
.grid-item img,.grid-item video{width:100%;height:100%;object-fit:cover}
.grid-item .vid-icon{position:absolute;top:8px;right:8px;font-size:16px}

/* Reels */
.reels{height:calc(100vh - 60px);overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;padding-top:0!important}
.reels::-webkit-scrollbar{display:none}
.reel{height:calc(100vh - 60px);scroll-snap-align:start;position:relative;display:flex;align-items:center;justify-content:center;background:#000}
.reel video{width:100%;height:100%;object-fit:contain}
.reel-info{position:absolute;bottom:80px;left:14px;right:60px;z-index:2}
.reel-info .sub-name{font-size:14px;font-weight:700;margin-bottom:4px}
.reel-info .reel-title{font-size:13px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.reel-actions-side{position:absolute;right:10px;bottom:80px;display:flex;flex-direction:column;gap:20px;align-items:center}
.reel-actions-side button{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.reel-actions-side button span{font-size:11px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--bg);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));height:50px}
.bottom-nav button{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 12px}
.bottom-nav button.active{color:var(--text)}
.bottom-nav button span{font-size:9px}

/* Loading */
.loader{text-align:center;padding:40px;color:var(--text2)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Lightbox */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain}

/* Footer */
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text2);border-top:1px solid var(--border)}

/* Error */
.error-msg{text-align:center;padding:40px 20px;color:var(--text2)}
.error-msg button{margin-top:12px;padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px}

/* Reels content offset fix */
.reels .content-area{padding-top:0}
</style>
</head>
<body>

<div class="header">
  <h1>MemeByApex</h1>
  <button class="refresh-btn" onclick="refreshFeed()" title="Refresh">🔄</button>
</div>

<div class="stories" id="stories"></div>

<div class="tabs" id="tabs"></div>

<div class="content" id="content"></div>

<div class="bottom-nav">
  <button class="active" onclick="switchView('home',this)"><span style="font-size:22px">🏠</span><span>Home</span></button>
  <button onclick="switchView('explore',this)"><span style="font-size:22px">🔍</span><span>Explore</span></button>
  <button onclick="switchView('reels',this)"><span style="font-size:22px">🎬</span><span>Reels</span></button>
  <button onclick="refreshFeed()"><span style="font-size:22px">🔄</span><span>Refresh</span></button>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
const CATEGORIES = [
  {key:'memes',name:'Memes',sub:'memes',emoji:'😂'},
  {key:'dank',name:'Dank',sub:'dankmemes',emoji:'💀'},
  {key:'desi',name:'Desi',sub:'IndianDankMemes',emoji:'🇮🇳'},
  {key:'bollywood',name:'Bollywood',sub:'BollywoodMemes',emoji:'🎬'},
  {key:'brainrot',name:'Brainrot',sub:'brainrot',emoji:'🧠'},
  {key:'wholesome',name:'Wholesome',sub:'wholesomememes',emoji:'🥰'},
  {key:'shitpost',name:'Shitpost',sub:'shitposting',emoji:'💩'}
];

let allPosts = [];
let currentCategory = 'all';
let currentView = 'home';
let likedPosts = new Set(JSON.parse(localStorage.getItem('liked')||'[]'));
let loading = false;
let after = {};

// Init stories
const storiesEl = document.getElementById('stories');
storiesEl.innerHTML = [{key:'all',name:'All',emoji:'🔥'},...CATEGORIES].map(c =>
  `<div class="story" onclick="selectCategory('${c.key}')">
    <div class="ring ${c.key==='all'?'active':''}"><div class="avatar">${c.emoji}</div></div>
    <span>${c.name}</span>
  </div>`
).join('');

// Init tabs
const tabsEl = document.getElementById('tabs');
tabsEl.innerHTML = [{key:'all',name:'All'},...CATEGORIES].map(c =>
  `<div class="tab ${c.key==='all'?'active':''}" onclick="selectCategory('${c.key}')">${c.name}</div>`
).join('');

function selectCategory(key) {
  currentCategory = key;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.trim()===([{key:'all',name:'All'},...CATEGORIES].find(c=>c.key===key)?.name||'')));
  document.querySelectorAll('.story .ring').forEach((r,i) => {
    const cats = [{key:'all'},...CATEGORIES];
    r.classList.toggle('active', cats[i]?.key===key);
  });
  renderView();
}

function getFilteredPosts() {
  if (currentCategory === 'all') return allPosts;
  const cat = CATEGORIES.find(c => c.key === currentCategory);
  return allPosts.filter(p => p.subreddit.toLowerCase() === cat?.sub.toLowerCase());
}

function isImage(p) {
  return p.post_hint === 'image' || /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(p.url);
}
function isVideo(p) {
  return p.is_video && p.media?.reddit_video?.fallback_url;
}
function getVideoUrl(p) {
  return p.media.reddit_video.fallback_url.replace(/&amp;/g,'&');
}
function cleanUrl(u) { return (u||'').replace(/&amp;/g,'&'); }

function timeAgo(utc) {
  const s = Math.floor(Date.now()/1000 - utc);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}

function toggleLike(id, btn) {
  if (likedPosts.has(id)) { likedPosts.delete(id); btn.classList.remove('liked'); btn.innerHTML='🤍'; }
  else { likedPosts.add(id); btn.classList.add('liked'); btn.innerHTML='❤️'; }
  localStorage.setItem('liked', JSON.stringify([...likedPosts]));
}

function doubleTapLike(e, id) {
  const now = Date.now();
  if (e.target._lastTap && now - e.target._lastTap < 300) {
    likedPosts.add(id);
    localStorage.setItem('liked', JSON.stringify([...likedPosts]));
    const heart = e.currentTarget.querySelector('.heart-anim');
    if (heart) { heart.classList.remove('show'); void heart.offsetWidth; heart.classList.add('show'); }
    const btn = e.currentTarget.closest('.post')?.querySelector('.like-btn');
    if (btn) { btn.classList.add('liked'); btn.innerHTML='❤️'; }
  }
  e.target._lastTap = now;
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function renderView() {
  const posts = getFilteredPosts();
  const content = document.getElementById('content');

  if (currentView === 'home') {
    content.style.paddingTop = '180px';
    document.querySelector('.stories').style.display = 'flex';
    document.querySelector('.tabs').style.display = 'flex';
    content.innerHTML = '<div class="feed">' + posts.filter(p => isImage(p) || isVideo(p)).map(p => {
      const liked = likedPosts.has(p.id);
      let media = '';
      if (isVideo(p)) {
        media = `<video src="${getVideoUrl(p)}" controls playsinline loop muted preload="metadata"></video>`;
      } else {
        media = `<img src="${cleanUrl(p.url)}" alt="${p.title}" loading="lazy" onclick="openLightbox('${cleanUrl(p.url).replace(/'/g,"\\'")}')" onerror="this.parentElement.style.display='none'">`;
      }
      return `<div class="post">
        <div class="post-header">
          <div class="sub-icon">${CATEGORIES.find(c=>c.sub.toLowerCase()===p.subreddit.toLowerCase())?.emoji||'📌'}</div>
          <div class="sub-info"><div class="sub-name">r/${p.subreddit}</div><div class="post-time">${timeAgo(p.created_utc)}</div></div>
        </div>
        <div class="post-title">${p.title}</div>
        <div class="post-media" ondblclick="doubleTapLike(event,'${p.id}')">
          ${media}
          <div class="heart-anim">❤️</div>
        </div>
        <div class="post-actions">
          <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}',this)">${liked?'❤️':'🤍'}</button>
          <button>💬 ${p.num_comments}</button>
          <span class="stats">⬆️ ${p.ups>=1000?(p.ups/1000).toFixed(1)+'k':p.ups}</span>
        </div>
      </div>`;
    }).join('') + '</div><div class="footer">Made by Wadeem for Doublespeed ⚡ | Powered by Reddit</div>';

  } else if (currentView === 'explore') {
    content.style.paddingTop = '180px';
    document.querySelector('.stories').style.display = 'flex';
    document.querySelector('.tabs').style.display = 'flex';
    const items = posts.filter(p => isImage(p));
    content.innerHTML = '<div class="grid">' + items.map(p =>
      `<div class="grid-item" onclick="openLightbox('${cleanUrl(p.url).replace(/'/g,"\\'")}')"><img src="${cleanUrl(p.url)}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`
    ).join('') + '</div><div class="footer">Made by Wadeem for Doublespeed ⚡ | Powered by Reddit</div>';

  } else if (currentView === 'reels') {
    content.style.paddingTop = '0';
    document.querySelector('.stories').style.display = 'none';
    document.querySelector('.tabs').style.display = 'none';
    const vids = posts.filter(p => isVideo(p));
    if (!vids.length) {
      content.innerHTML = '<div class="error-msg" style="padding-top:100px">No video posts found. Try refreshing!<br><button onclick="refreshFeed()">Refresh</button></div>';
      return;
    }
    content.innerHTML = '<div class="reels">' + vids.map(p => {
      const liked = likedPosts.has(p.id);
      return `<div class="reel">
        <video src="${getVideoUrl(p)}" controls playsinline loop preload="metadata" onclick="this.paused?this.play():this.pause()"></video>
        <div class="reel-info"><div class="sub-name">r/${p.subreddit}</div><div class="reel-title">${p.title}</div></div>
        <div class="reel-actions-side">
          <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${p.id}',this)">${liked?'❤️':'🤍'}<span>${p.ups>=1000?(p.ups/1000).toFixed(1)+'k':p.ups}</span></button>
          <button>💬<span>${p.num_comments}</span></button>
        </div>
      </div>`;
    }).join('') + '</div>';

    // Auto-play visible reel
    const reelsContainer = content.querySelector('.reels');
    if (reelsContainer) {
      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
          const v = e.target.querySelector('video');
          if (v) { e.isIntersecting ? v.play().catch(()=>{}) : v.pause(); }
        });
      }, {root: reelsContainer, threshold: 0.6});
      reelsContainer.querySelectorAll('.reel').forEach(r => observer.observe(r));
    }
  }
}

function switchView(view, btn) {
  currentView = view;
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderView();
}

async function fetchSubreddit(sub) {
  const cached = sessionStorage.getItem('reddit_'+sub);
  if (cached) {
    try { return JSON.parse(cached); } catch(e) {}
  }
  try {
    const r = await fetch(`https://www.reddit.com/r/${sub}/hot.json?limit=30&raw_json=1`, {headers:{'Accept':'application/json'}});
    if (!r.ok) throw new Error(r.status);
    const json = await r.json();
    const posts = json.data.children.map(c => c.data).filter(p => !p.stickied && !p.over_18);
    sessionStorage.setItem('reddit_'+sub, JSON.stringify(posts));
    return posts;
  } catch(e) {
    console.error('Failed to fetch r/'+sub, e);
    return [];
  }
}

async function loadAll(force) {
  if (loading) return;
  loading = true;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loader"><div class="spinner"></div>Loading fresh memes...</div>';

  if (force) {
    CATEGORIES.forEach(c => sessionStorage.removeItem('reddit_'+c.sub));
  }

  const results = await Promise.all(CATEGORIES.map(c => fetchSubreddit(c.sub)));
  allPosts = results.flat().sort(() => Math.random() - 0.5);
  loading = false;
  renderView();
}

function refreshFeed() {
  loadAll(true);
}

// Infinite scroll
window.addEventListener('scroll', () => {
  if (currentView !== 'home' && currentView !== 'explore') return;
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
    // Could load more via after param, but for now we have enough
  }
});

loadAll(false);
</script>
</body>
</html>
