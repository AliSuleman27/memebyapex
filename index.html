<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>MemeByApex</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#000;--border:#262626;--text:#f5f5f5;--text2:#a8a8a8;--link:#e0f1ff;--heart:#ff3040;--ig-gradient:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.4}
a{color:inherit;text-decoration:none}

/* Layout */
.app{height:100%;display:flex;flex-direction:column}
.top-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);z-index:100}
.top-bar .logo{font-family:'Segoe Script','Dancing Script',cursive;font-size:22px;font-weight:700;letter-spacing:-0.5px}
.top-bar .icons{display:flex;gap:20px;align-items:center}
.top-bar .icons svg{width:24px;height:24px;fill:none;stroke:var(--text);stroke-width:2;cursor:pointer}
.content{flex:1;overflow:hidden;position:relative}
.tab-page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.tab-page.active{display:block}
.tab-page.reels-page{overflow:hidden}
.bottom-nav{height:49px;display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);z-index:100}
.bottom-nav .nav-item{display:flex;align-items:center;justify-content:center;width:48px;height:48px;cursor:pointer}
.bottom-nav svg{width:24px;height:24px;fill:var(--text);stroke:none}
.bottom-nav .nav-item.active svg{fill:var(--text)}

/* Stories */
.stories{display:flex;gap:12px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2px;background:var(--ig-gradient)}
.story-ring.seen{background:#555}
.story-avatar{width:100%;height:100%;border-radius:50%;border:3px solid var(--bg);object-fit:cover;background:#222}
.story-name{font-size:11px;color:var(--text2);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

/* Skeleton */
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.skeleton{background:linear-gradient(90deg,#222 25%,#333 50%,#222 75%);background-size:400px 100%;animation:shimmer 1.2s infinite}
.skel-post{padding:12px 16px;border-bottom:1px solid var(--border)}
.skel-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.skel-avatar{width:32px;height:32px;border-radius:50%}
.skel-line{height:12px;border-radius:4px}
.skel-img{width:100%;aspect-ratio:1;border-radius:4px;margin-bottom:12px}

/* Post */
.post{border-bottom:1px solid var(--border)}
.post-header{display:flex;align-items:center;padding:10px 12px}
.post-header img{width:32px;height:32px;border-radius:50%;object-fit:cover;background:#222}
.post-header .info{flex:1;margin-left:10px}
.post-header .username{font-weight:600;font-size:13px}
.post-header .more{cursor:pointer;padding:8px}
.post-header .more svg{width:16px;height:16px;fill:var(--text)}
.post-img-wrap{position:relative;width:100%;background:#111;min-height:200px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none}
.post-img-wrap img{width:100%;display:block}
.dbl-heart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;color:#fff;pointer-events:none;z-index:10;filter:drop-shadow(0 0 10px rgba(0,0,0,.5))}
.dbl-heart.show{animation:dblHeart .8s ease forwards}
@keyframes dblHeart{0%{transform:translate(-50%,-50%) scale(0);opacity:1}15%{transform:translate(-50%,-50%) scale(1.2);opacity:1}30%{transform:translate(-50%,-50%) scale(1);opacity:1}75%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.post-actions{display:flex;align-items:center;padding:8px 12px}
.post-actions .left{display:flex;gap:16px;flex:1}
.post-actions svg{width:24px;height:24px;cursor:pointer;fill:none;stroke:var(--text);stroke-width:2}
.post-actions .liked svg{fill:var(--heart);stroke:var(--heart)}
.post-actions .saved svg{fill:var(--text);stroke:var(--text)}
.post-details{padding:0 12px 12px}
.post-details .likes{font-weight:600;font-size:13px;margin-bottom:4px}
.post-details .caption{font-size:13px;margin-bottom:4px}
.post-details .caption b{font-weight:600}
.post-details .view-comments{color:var(--text2);font-size:13px;margin-bottom:2px}
.post-details .time{color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.suggested-label{padding:16px;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px;color:var(--text2)}

/* Explore */
.explore-search{padding:10px 16px;position:sticky;top:0;background:var(--bg);z-index:10}
.explore-search input{width:100%;height:36px;border-radius:10px;border:none;background:#262626;color:var(--text);padding:0 16px;font-size:14px;outline:none}
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px}
.explore-grid .item{position:relative;overflow:hidden;background:#111;cursor:pointer}
.explore-grid .item img{width:100%;height:100%;object-fit:cover;display:block}
.explore-grid .item.tall{grid-row:span 2}

/* Reels */
.reels-container{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none}
.reels-container::-webkit-scrollbar{display:none}
.reel{height:100%;scroll-snap-align:start;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
.reel iframe{width:100%;height:100%;border:none;pointer-events:auto}
.reel-overlay{position:absolute;right:8px;bottom:80px;display:flex;flex-direction:column;align-items:center;gap:20px;z-index:10}
.reel-overlay .reel-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.reel-overlay .reel-btn svg{width:28px;height:28px;fill:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))}
.reel-overlay .reel-btn span{font-size:11px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.reel-info{position:absolute;left:12px;bottom:70px;right:60px;z-index:10}
.reel-info .reel-user{font-weight:700;font-size:14px;margin-bottom:4px;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.reel-info .reel-desc{font-size:13px;color:#eee;margin-bottom:8px;text-shadow:0 1px 3px rgba(0,0,0,.7)}
.reel-info .music-ticker{display:flex;align-items:center;gap:6px;font-size:12px;color:#ddd;overflow:hidden;white-space:nowrap}
.reel-info .music-ticker .ticker-text{animation:ticker 8s linear infinite}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

/* Profile */
.profile-page{padding:16px}
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.profile-header .pfp{width:77px;height:77px;border-radius:50%;background:#222;object-fit:cover}
.profile-stats{display:flex;flex:1;justify-content:space-around;text-align:center}
.profile-stats .stat-num{font-weight:700;font-size:16px}
.profile-stats .stat-label{font-size:12px;color:var(--text2)}
.profile-name{font-weight:600;font-size:14px;margin-bottom:4px}
.profile-bio{font-size:13px;color:var(--text2);margin-bottom:12px}
.profile-btn{width:100%;padding:7px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-weight:600;font-size:13px;cursor:pointer;margin-bottom:16px}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.profile-grid img{width:100%;aspect-ratio:1;object-fit:cover;background:#111}

/* Desktop responsive */
@media (min-width: 768px) {
  .app{max-width:935px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border)}
  .top-bar{padding:0 20px}
  .top-bar .logo{font-size:24px}
  .stories{max-width:100%;padding:16px 24px;justify-content:center}
  .post{max-width:470px;margin:0 auto;border:1px solid var(--border);border-top:none;margin-bottom:12px}
  .post:first-of-type{border-top:1px solid var(--border);margin-top:16px}
  .suggested-label{max-width:470px;margin:0 auto}
  .explore-grid{gap:4px;padding:4px}
  .reels-container{max-width:400px;margin:0 auto}
  .reel{border-radius:12px;overflow:hidden}
  .profile-page{max-width:600px;margin:0 auto;padding:24px 16px}
  .profile-header .pfp{width:100px;height:100px}
  .profile-stats .stat-num{font-size:18px}
  .profile-grid{gap:4px}
  .bottom-nav{max-width:935px;margin:0 auto}
  .explore-search{max-width:500px;margin:0 auto;padding:12px 0}
  .skel-post{max-width:470px;margin:0 auto}
}

@media (min-width: 1024px) {
  .app{max-width:935px}
  .stories{gap:16px}
  .post{margin-bottom:16px;border-radius:8px;border:1px solid var(--border);overflow:hidden}
  .explore-grid{grid-template-columns:repeat(4,1fr)}
  .profile-grid{grid-template-columns:repeat(3,1fr);gap:6px}
}

/* Story Viewer Overlay */
.story-viewer{position:fixed;inset:0;background:#000;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;-webkit-user-select:none;user-select:none}
.story-viewer.open{display:flex}
.story-viewer-header{position:absolute;top:0;left:0;right:0;z-index:10;padding:8px 12px}
.story-progress{display:flex;gap:3px;margin-bottom:8px}
.story-progress-bar{flex:1;height:2px;background:rgba(255,255,255,.3);border-radius:1px;overflow:hidden}
.story-progress-bar .fill{height:100%;background:#fff;width:0%;transition:width 5s linear}
.story-progress-bar .fill.done{width:100%!important;transition:none}
.story-progress-bar .fill.active{width:100%;transition:width 5s linear}
.story-viewer-user{display:flex;align-items:center;gap:8px}
.story-viewer-user img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.story-viewer-user span{color:#fff;font-weight:600;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.story-viewer-user .time{color:rgba(255,255,255,.6);font-weight:400;font-size:12px;margin-left:4px}
.story-viewer-close{position:absolute;top:12px;right:12px;z-index:11;color:#fff;font-size:28px;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:50%;border:none}
.story-viewer-img{max-width:100%;max-height:100%;object-fit:contain}
.story-viewer .tap-left,.story-viewer .tap-right{position:absolute;top:0;bottom:0;z-index:5}
.story-viewer .tap-left{left:0;width:30%}
.story-viewer .tap-right{right:0;width:70%}

@media (min-width:768px){
  .story-viewer-content{max-width:400px;max-height:700px;width:100%;height:90vh;position:relative;border-radius:12px;overflow:hidden;background:#111}
  .story-viewer-img{width:100%;height:100%;object-fit:cover}
}

/* Pull to refresh */
.ptr{text-align:center;padding:12px;color:var(--text2);font-size:12px;display:none}
.ptr.show{display:block}

/* Scrollbar hide */
.tab-page::-webkit-scrollbar{display:none}
.tab-page{scrollbar-width:none}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar" id="topBar">
    <div class="logo">MemeByApex</div>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
    </div>
  </div>

  <div class="content">
    <!-- Home -->
    <div class="tab-page active" id="homePage">
      <div class="ptr" id="homePtr">Pull to refresh...</div>
      <div class="stories" id="stories"></div>
      <div id="feedContainer"></div>
    </div>
    <!-- Explore -->
    <div class="tab-page" id="explorePage">
      <div class="explore-search"><input type="text" placeholder="Search"></div>
      <div class="explore-grid" id="exploreGrid"></div>
    </div>
    <!-- Reels -->
    <div class="tab-page reels-page" id="reelsPage">
      <div class="reels-container" id="reelsContainer"></div>
    </div>
    <!-- Shop/Activity -->
    <div class="tab-page" id="shopPage" style="display:none;padding:60px 20px;text-align:center;color:var(--text2)">
      <svg style="width:48px;height:48px;margin-bottom:16px;fill:none;stroke:var(--text2);stroke-width:1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
      <p>Shop coming soon</p>
    </div>
    <!-- Profile -->
    <div class="tab-page" id="profilePage">
      <div class="profile-page">
        <div class="profile-header">
          <img class="pfp" src="https://i.pravatar.cc/150?img=68" alt="pfp">
          <div class="profile-stats">
            <div><div class="stat-num" id="postCount">0</div><div class="stat-label">Posts</div></div>
            <div><div class="stat-num">42.0K</div><div class="stat-label">Followers</div></div>
            <div><div class="stat-num">420</div><div class="stat-label">Following</div></div>
          </div>
        </div>
        <div class="profile-name">MemeByApex 🔥</div>
        <div class="profile-bio">Dankest memes on the internet 💀<br>DM for collabs • Daily posts</div>
        <button class="profile-btn">Edit Profile</button>
        <div class="profile-grid" id="profileGrid"></div>
      </div>
    </div>
  </div>

  <!-- Story Viewer -->
  <div class="story-viewer" id="storyViewer">
    <div class="story-viewer-header">
      <div class="story-progress" id="storyProgress"></div>
      <div class="story-viewer-user" id="storyViewerUser"></div>
    </div>
    <button class="story-viewer-close" id="storyClose">&times;</button>
    <div class="tap-left" id="storyTapLeft"></div>
    <div class="tap-right" id="storyTapRight"></div>
    <img class="story-viewer-img" id="storyViewerImg" src="" alt="">
  </div>

  <div class="bottom-nav" id="bottomNav">
    <div class="nav-item active" data-tab="home">
      <svg viewBox="0 0 24 24"><path d="M9.005 16.545a2.997 2.997 0 012.997-2.997h0A2.997 2.997 0 0115 16.545V22H9.005V16.545zM22 10.998V22H15.01v-5.455a2.997 2.997 0 00-2.997-2.997h0a2.997 2.997 0 00-2.997 2.997V22H2V10.998l10-8.998z" fill="var(--text)" stroke="none"/></svg>
    </div>
    <div class="nav-item" data-tab="explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div class="nav-item" data-tab="reels">
      <svg viewBox="0 0 24 24"><path d="M12.823 1l2.974 5.002h-5.58l-2.65-5.003h-1.93l2.65 5.003H3.71a2.5 2.5 0 00-1.71.68V22.5A1.5 1.5 0 003.5 24h17a1.5 1.5 0 001.5-1.5V7.5a1.5 1.5 0 00-1.5-1.5h-2.77L14.82 1h-1.997zM9.3 1L6.65 6H3.5A2.5 2.5 0 001 8.5v14A2.5 2.5 0 003.5 25h17a2.5 2.5 0 002.5-2.5v-14A2.5 2.5 0 0020.5 6h-1.62L15.88 1H9.3zM10.5 9.5l6.5 3.75-6.5 3.75V9.5z" fill="var(--text)" stroke="none"/></svg>

    </div>
    <div class="nav-item" data-tab="profile">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4.5" fill="none" stroke="var(--text)" stroke-width="2"/><path d="M20 21c0-3.87-3.58-7-8-7s-8 3.13-8 7" fill="none" stroke="var(--text)" stroke-width="2"/></svg>
    </div>
  </div>
</div>

<script>
// State
const state = {
  feed: [],
  explore: [],
  liked: JSON.parse(localStorage.getItem('liked') || '{}'),
  saved: JSON.parse(localStorage.getItem('saved') || '{}'),
  currentTab: 'home',
  loaded: false
};

const storyNames = ['apex_memes','dank_lord','shitposter','meme.king','cursed.img','based_guy','touch.grass','no_cap','sigma.male','ratio_king','ded_inside','memequeen','vibe_check','ok_boomer'];

// SVG icons
const icons = {
  heart: `<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`,
  heartFill: `<svg viewBox="0 0 24 24" style="fill:var(--heart);stroke:var(--heart)"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`,
  comment: `<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>`,
  share: `<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
  save: `<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>`
};

// Init stories
function renderStories() {
  const c = document.getElementById('stories');
  c.innerHTML = storyNames.map((n, i) => `
    <div class="story">
      <div class="story-ring${i > 4 ? ' seen' : ''}">
        <img class="story-avatar" src="https://i.pravatar.cc/100?img=${i+10}" alt="">
      </div>
      <span class="story-name">${n}</span>
    </div>
  `).join('');
}

// Skeleton
function showSkeletons() {
  const c = document.getElementById('feedContainer');
  c.innerHTML = Array(3).fill('').map(() => `
    <div class="skel-post">
      <div class="skel-header">
        <div class="skeleton skel-avatar"></div>
        <div class="skeleton skel-line" style="width:120px"></div>
      </div>
      <div class="skeleton skel-img"></div>
      <div class="skeleton skel-line" style="width:180px;margin-bottom:8px"></div>
      <div class="skeleton skel-line" style="width:100px"></div>
    </div>
  `).join('');
}

// Fetch feed
async function fetchFeed() {
  showSkeletons();
  const subs = [
    ['memes', 20], ['dankmemes', 20], ['IndianDankMemes', 15],
    ['BollywoodMemes', 10], ['wholesomememes', 15], ['shitposting', 15]
  ];
  const results = await Promise.allSettled(
    subs.map(([s, n]) => fetch(`https://meme-api.com/gimme/${s}/${n}`).then(r => r.json()))
  );
  let posts = [];
  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value.memes) {
      posts.push(...r.value.memes.filter(m => !m.nsfw && m.url));
    }
  });
  // Shuffle
  for (let i = posts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [posts[i], posts[j]] = [posts[j], posts[i]];
  }
  state.feed = posts;
  state.explore = [...posts].sort(() => Math.random() - 0.5);
  renderFeed();
  renderExplore();
  renderProfileGrid();
  state.loaded = true;
}

function renderFeed() {
  const c = document.getElementById('feedContainer');
  c.innerHTML = state.feed.map((p, i) => {
    const id = p.url;
    const liked = state.liked[id];
    const saved = state.saved[id];
    const suggested = i > 0 && i % 8 === 0;
    return (suggested ? `<div class="suggested-label"><span>Suggested for you</span></div>` : '') + `
    <div class="post" data-id="${encodeURIComponent(id)}">
      <div class="post-header">
        <img src="https://i.pravatar.cc/64?u=${p.author}" alt="">
        <div class="info"><div class="username">${p.author || 'anonymous'}</div></div>
        <div class="more"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></div>
      </div>
      <div class="post-img-wrap" ondblclick="doubleTap(this,'${encodeURIComponent(id)}')">
        <img src="${p.url}" alt="" loading="lazy" onerror="this.parentElement.parentElement.style.display='none'">
        <div class="dbl-heart">❤️</div>
      </div>
      <div class="post-actions">
        <div class="left">
          <span class="${liked ? 'liked' : ''}" onclick="toggleLike(this,'${encodeURIComponent(id)}')">${liked ? icons.heartFill : icons.heart}</span>
          <span>${icons.comment}</span>
          <span onclick="sharePost('${encodeURIComponent(p.url)}')">${icons.share}</span>
        </div>
        <span class="${saved ? 'saved' : ''}" onclick="toggleSave(this,'${encodeURIComponent(id)}')">${icons.save}</span>
      </div>
      <div class="post-details">
        <div class="likes">${(Math.floor(Math.random() * 50000) + 100).toLocaleString()} likes</div>
        <div class="caption"><b>${p.author || 'anonymous'}</b> ${p.title || ''}</div>
        <div class="view-comments">View all ${Math.floor(Math.random() * 500)} comments</div>
        <div class="time">${Math.floor(Math.random() * 23) + 1} hours ago</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('postCount').textContent = state.feed.length;
}

function renderExplore() {
  const g = document.getElementById('exploreGrid');
  g.innerHTML = state.explore.slice(0, 60).map((p, i) => {
    const tall = (i % 10 === 2 || i % 10 === 7);
    return `<div class="item${tall ? ' tall' : ''}"><img src="${p.url}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;
  }).join('');
}

function renderProfileGrid() {
  const g = document.getElementById('profileGrid');
  g.innerHTML = state.feed.slice(0, 18).map(p => `<img src="${p.url}" alt="" loading="lazy" onerror="this.style.display='none'">`).join('');

// Actions
function doubleTap(el, id) {
  id = decodeURIComponent(id);
  const heart = el.querySelector('.dbl-heart');
  heart.classList.remove('show');
  void heart.offsetWidth;
  heart.classList.add('show');
  if (!state.liked[id]) {
    state.liked[id] = true;
    localStorage.setItem('liked', JSON.stringify(state.liked));
    const post = el.closest('.post');
    const btn = post.querySelector('.post-actions .left span:first-child');
    btn.classList.add('liked');
    btn.innerHTML = icons.heartFill;
  }
}

function toggleLike(el, id) {
  id = decodeURIComponent(id);
  state.liked[id] = !state.liked[id];
  if (!state.liked[id]) delete state.liked[id];
  localStorage.setItem('liked', JSON.stringify(state.liked));
  el.classList.toggle('liked');
  el.innerHTML = state.liked[id] ? icons.heartFill : icons.heart;
}

function toggleSave(el, id) {
  id = decodeURIComponent(id);
  state.saved[id] = !state.saved[id];
  if (!state.saved[id]) delete state.saved[id];
  localStorage.setItem('saved', JSON.stringify(state.saved));
  el.classList.toggle('saved');
}

async function sharePost(url) {
  url = decodeURIComponent(url);
  if (navigator.share) {
    try { await navigator.share({ url }); } catch(e) {}
  } else {
    await navigator.clipboard.writeText(url);
  }
}

// Tab switching
const pages = { home: 'homePage', explore: 'explorePage', reels: 'reelsPage', shop: 'shopPage', profile: 'profilePage' };
document.getElementById('bottomNav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (!item) return;
  const tab = item.dataset.tab;
  if (tab === state.currentTab) {
    // Scroll to top
    document.getElementById(pages[tab])?.scrollTo(0, 0);
    return;
  }
  state.currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  item.classList.add('active');
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.getElementById(pages[tab]).classList.add('active');
  // Toggle top bar
  document.getElementById('topBar').style.display = (tab === 'reels') ? 'none' : '';
});

// Story Viewer
const storyViewer = {
  el: document.getElementById('storyViewer'),
  img: document.getElementById('storyViewerImg'),
  progress: document.getElementById('storyProgress'),
  userEl: document.getElementById('storyViewerUser'),
  currentGroup: 0,
  currentSlide: 0,
  timer: null,
  DURATION: 5000,
  // Each story user gets 3 random "slides" using picsum
  getSlides(idx) {
    return [0,1,2].map(s => `https://picsum.photos/seed/story${idx}s${s}/600/1000`);
  },
  open(idx) {
    this.currentGroup = idx;
    this.currentSlide = 0;
    this.el.classList.add('open');
    document.body.style.overflow = 'hidden';
    this.show();
  },
  close() {
    this.el.classList.remove('open');
    document.body.style.overflow = '';
    clearTimeout(this.timer);
    // Mark as seen
    const ring = document.querySelectorAll('.story-ring')[this.currentGroup];
    if (ring) ring.classList.add('seen');
  },
  show() {
    clearTimeout(this.timer);
    const slides = this.getSlides(this.currentGroup);
    const name = storyNames[this.currentGroup];
    this.img.src = slides[this.currentSlide];
    // Progress bars
    this.progress.innerHTML = slides.map((_, i) => `<div class="story-progress-bar"><div class="fill ${i < this.currentSlide ? 'done' : ''}"></div></div>`).join('');
    // Animate current bar
    requestAnimationFrame(() => {
      const bars = this.progress.querySelectorAll('.fill');
      if (bars[this.currentSlide]) {
        void bars[this.currentSlide].offsetWidth;
        bars[this.currentSlide].classList.add('active');
      }
    });
    // User info
    this.userEl.innerHTML = `<img src="https://i.pravatar.cc/100?img=${this.currentGroup+10}" alt=""><span>${name}</span><span class="time">${Math.floor(Math.random()*12)+1}h</span>`;
    // Auto-advance
    this.timer = setTimeout(() => this.next(), this.DURATION);
  },
  next() {
    const slides = this.getSlides(this.currentGroup);
    if (this.currentSlide < slides.length - 1) {
      this.currentSlide++;
      this.show();
    } else if (this.currentGroup < storyNames.length - 1) {
      this.currentGroup++;
      this.currentSlide = 0;
      this.show();
    } else {
      this.close();
    }
  },
  prev() {
    if (this.currentSlide > 0) {
      this.currentSlide--;
      this.show();
    } else if (this.currentGroup > 0) {
      this.currentGroup--;
      const slides = this.getSlides(this.currentGroup);
      this.currentSlide = slides.length - 1;
      this.show();
    }
  }
};

document.getElementById('storyClose').addEventListener('click', e => { e.stopPropagation(); storyViewer.close(); });
document.getElementById('storyTapLeft').addEventListener('click', e => { e.stopPropagation(); storyViewer.prev(); });
document.getElementById('storyTapRight').addEventListener('click', e => { e.stopPropagation(); storyViewer.next(); });
document.addEventListener('keydown', e => {
  if (!storyViewer.el.classList.contains('open')) return;
  if (e.key === 'Escape') storyViewer.close();
  if (e.key === 'ArrowRight') storyViewer.next();
  if (e.key === 'ArrowLeft') storyViewer.prev();
});

// Attach click handlers to stories
document.getElementById('stories').addEventListener('click', e => {
  const story = e.target.closest('.story');
  if (!story) return;
  const idx = [...story.parentElement.children].indexOf(story);
  storyViewer.open(idx);
});

renderStories();
renderReels();
fetchFeed();
