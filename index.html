<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemeByApex 😂</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
  }
  
  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #1a1a1a;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .logo {
    font-size: 24px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .logo span { font-weight: 400; opacity: 0.7; }
  
  .shuffle-btn {
    background: linear-gradient(135deg, #FF6B6B, #ee5a24);
    border: none;
    color: #fff;
    padding: 10px 24px;
    border-radius: 50px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .shuffle-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(255,107,107,0.4); }
  .shuffle-btn:active { transform: scale(0.95); }
  
  /* Category Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .tabs::-webkit-scrollbar { display: none; }
  
  .tab {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    padding: 8px 18px;
    border-radius: 50px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  
  .tab:hover { border-color: #444; color: #ccc; }
  .tab.active { background: #fff; color: #000; border-color: #fff; }
  
  /* Meme Grid */
  .meme-grid {
    columns: 2;
    column-gap: 12px;
    padding: 12px 24px 100px;
  }
  
  @media (min-width: 768px) { .meme-grid { columns: 3; } }
  @media (min-width: 1200px) { .meme-grid { columns: 4; } }
  
  .meme-card {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 16px;
    overflow: hidden;
    background: #141414;
    border: 1px solid #1a1a1a;
    transition: all 0.3s;
    cursor: pointer;
    animation: fadeUp 0.5s ease both;
  }
  
  .meme-card:hover { transform: translateY(-4px); border-color: #333; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  
  .meme-card img {
    width: 100%;
    display: block;
    transition: transform 0.3s;
  }
  
  .meme-card:hover img { transform: scale(1.03); }
  
  .meme-info {
    padding: 12px 14px;
  }
  
  .meme-name {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  
  .meme-year {
    font-size: 11px;
    color: #666;
  }
  
  .meme-tag {
    display: inline-block;
    background: #1a1a1a;
    color: #888;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 6px;
    font-weight: 600;
  }
  
  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  
  .lightbox.show { display: flex; }
  
  .lightbox img {
    max-width: 90%;
    max-height: 85vh;
    border-radius: 12px;
    object-fit: contain;
  }
  
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: #fff;
    font-size: 32px;
    cursor: pointer;
    opacity: 0.7;
  }
  
  .lightbox-close:hover { opacity: 1; }
  
  .lightbox-title {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 40px 24px;
    color: #333;
    font-size: 12px;
  }
  
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    color: #444;
    font-size: 14px;
  }
  
  .loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #222;
    border-top-color: #FF6B6B;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="footer">

const categories = ['all', ...new Set(memes.map(m => m.cat))];
let activeCategory = 'all';

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = categories.map(c => 
    `<button class="tab ${c === activeCategory ? 'active' : ''}" onclick="filterCategory('${c}')">${c === 'all' ? '🔥 All' : c.charAt(0).toUpperCase() + c.slice(1)}</button>`
  ).join('');
}

function renderMemes(list) {
  const grid = document.getElementById('memeGrid');
  grid.innerHTML = list.map((m, i) => `
    <div class="meme-card" style="animation-delay:${i * 0.05}s" onclick="openLightbox('${m.img.replace(/'/g,"\\'")}', '${m.name.replace(/'/g,"\\'")}')">
      <img src="${m.img}" alt="${m.name}" loading="lazy">
      <div class="meme-info">
        <div class="meme-name">${m.name}</div>
        <div class="meme-year">${m.year}</div>
        <span class="meme-tag">${m.cat}</span>
      </div>
    </div>
  `).join('');
}

function filterCategory(cat) {
  activeCategory = cat;
  renderTabs();
  const filtered = cat === 'all' ? [...memes] : memes.filter(m => m.cat === cat);
  renderMemes(filtered);
}

function shuffleMemes() {
  const list = activeCategory === 'all' ? [...memes] : memes.filter(m => m.cat === activeCategory);
  for (let i = list.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [list[i], list[j]] = [list[j], list[i]];
  }
  renderMemes(list);
}

function openLightbox(src, title) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxTitle').textContent = title;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Init
renderTabs();
shuffleMemes();
</script>
